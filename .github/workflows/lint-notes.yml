name: Lint infrastructure notes

on:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  lint-notes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/lint-notes.js
